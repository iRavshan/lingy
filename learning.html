<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'zbek Imo-ishora Tilini O'rganing | UzSL Duolingo</title>
    <meta name="description" content="Kichik qismlardan iborat qiziqarli darslar orqali o'zbek imo-ishora tilini zamonaviy interaktiv usulda o'rganing.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="learning-page-body">
    <!-- Navbar -->
    <nav class="navbar scrolled" id="navbar" style="border-bottom: 1px solid var(--border-color);">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <i class="fa-solid fa-hands-asl-interpreting"></i>
                </div>
                <span>UzSL <strong>Learning</strong></span>
            </a>
            
            <div class="learning-stats" style="display: flex; gap: 20px; align-items: center; margin-left: auto; margin-right: 20px;">
                <div class="stat-item tooltip-container" title="Sizning seriyangiz (Streak)">
                    <i class="fa-solid fa-fire text-warning" style="font-size: 1.2rem;"></i>
                    <span style="font-weight: 600; color: var(--text-main);">12</span>
                </div>
                <div class="stat-item tooltip-container" title="Kristallar">
                    <i class="fa-solid fa-gem text-primary" style="font-size: 1.2rem;"></i>
                    <span style="font-weight: 600; color: var(--text-main);">450</span>
                </div>
                <div class="stat-item tooltip-container" title="Jonlar / Xatolar limiti">
                    <i class="fa-solid fa-heart text-danger" style="font-size: 1.2rem;"></i>
                    <span style="font-weight: 600; color: var(--text-main);">5</span>
                </div>
            </div>
            
            <div class="nav-actions">
                <button class="theme-toggle" id="theme-toggle" aria-label="Mavzuni o'zgartirish">
                    <i class="fa-solid fa-sun"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Learning Path Dashboard -->
    <main class="learning-dashboard-container" id="learning-dashboard" style="padding-top: 100px; padding-bottom: 80px; min-height: 100vh; position: relative;">
        <!-- Unit Header -->
        <div class="unit-header glass-panel" style="max-width: 600px; margin: 0 auto 50px auto; padding: 25px 35px; text-align: left; display: flex; align-items: center; justify-content: space-between; border-radius: 20px; background: linear-gradient(135deg, var(--bg-card) 0%, rgba(37,99,235,0.1) 100%);">
            <div>
                <span class="badge" style="background: var(--bg-main); font-weight: 700;">1-Bo'lim</span>
                <h2 style="margin-top: 10px; font-size: 1.8rem;">Dastlabki Salomlashuv</h2>
                <p style="color: var(--text-muted); margin-bottom: 0;">Eng kerakli kundalik so'zlar va muloqot boshlash sirlari</p>
            </div>
            <div class="unit-guide" style="width: 60px; height: 60px; background: rgba(37, 99, 235, 0.2); border: 2px solid var(--primary); border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s;">
                <i class="fa-solid fa-book-open text-primary" style="font-size: 1.5rem;"></i>
            </div>
        </div>

        <!-- Path Map -->
        <div class="path-container" style="max-width: 400px; margin: 0 auto; padding: 20px 0; display: flex; flex-direction: column; align-items: center; gap: 10px; position: relative;">
            
            <!-- SVG connector path line (visuals) -->
            <svg class="path-line" width="300" height="700" style="position: absolute; top: -20px; left: 50%; transform: translateX(-50%); z-index: -1;">
                <path d="M 150 50 Q 280 150 150 250 T 150 450 T 150 650" fill="transparent" stroke="var(--border-color)" stroke-width="15" stroke-linecap="round"/>
                <path d="M 150 50 Q 280 150 150 250" fill="transparent" stroke="var(--primary)" stroke-width="15" stroke-linecap="round"/>
            </svg>

            <!-- Node 1: Completed -->
            <div class="level-row" style="width: 100%; display: flex; justify-content: center; margin-bottom: 30px;">
                <button class="lesson-node node-completed" onclick="startLesson(1)" style="width: 80px; height: 80px; border-radius: 50%; background: var(--primary); border: none; box-shadow: 0 8px 0 rgba(30, 80, 200, 1), 0 15px 20px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; transform: translateX(0px); cursor: pointer; z-index: 2; position: relative;">
                    <i class="fa-solid fa-star" style="font-size: 2rem; color: white;"></i>
                    <div class="crown-badge" style="position: absolute; bottom: -10px; right: -5px; background: #ffbd2e; width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 0.8rem; font-weight: bold; border: 2px solid var(--bg-card); color: #000;">1</div>
                </button>
            </div>

            <!-- Node 2: Current / Active -->
            <div class="level-row" style="width: 100%; display: flex; justify-content: center; margin-bottom: 30px;">
                <div style="position: relative; transform: translateX(65px);">
                    <div class="start-tooltip fade-in-up" style="position: absolute; top: -50px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 8px 15px; border-radius: 12px; font-weight: bold; font-size: 0.9rem; white-space: nowrap; box-shadow: 0 5px 15px rgba(0,0,0,0.2); animation: float 2s infinite;">
                        Boshlash!
                        <div style="position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%) rotate(45deg); width: 12px; height: 12px; background: white;"></div>
                    </div>
                    <button class="lesson-node node-active pulse-ring" onclick="startLesson(2)" style="width: 90px; height: 90px; border-radius: 50%; background: var(--secondary); border: 6px solid var(--bg-main); box-shadow: 0 8px 0 rgba(100, 40, 220, 1), 0 15px 30px rgba(124, 58, 237, 0.4); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2;">
                        <i class="fa-solid fa-hand-sparkles" style="font-size: 2.5rem; color: white; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));"></i>
                    </button>
                    <!-- Progress ring SVG around active node could be added here -->
                </div>
            </div>

            <!-- Node 3: Locked -->
            <div class="level-row" style="width: 100%; display: flex; justify-content: center; margin-bottom: 30px;">
                <button class="lesson-node node-locked" disabled style="width: 80px; height: 80px; border-radius: 50%; background: var(--bg-card); border: 4px solid var(--border-color); box-shadow: 0 8px 0 var(--border-color); display: flex; align-items: center; justify-content: center; transform: translateX(0px); cursor: not-allowed; z-index: 2;">
                    <i class="fa-solid fa-lock" style="font-size: 1.8rem; color: var(--border-color);"></i>
                </button>
            </div>
            
            <!-- Node 4: Locked -->
            <div class="level-row" style="width: 100%; display: flex; justify-content: center; margin-bottom: 30px;">
                <button class="lesson-node node-locked" disabled style="width: 80px; height: 80px; border-radius: 50%; background: var(--bg-card); border: 4px solid var(--border-color); box-shadow: 0 8px 0 var(--border-color); display: flex; align-items: center; justify-content: center; transform: translateX(-50px); cursor: not-allowed; z-index: 2;">
                    <i class="fa-solid fa-comment" style="font-size: 1.8rem; color: var(--border-color);"></i>
                </button>
            </div>

             <!-- Node 5: Checkpoint -->
             <div class="level-row" style="width: 100%; display: flex; justify-content: center; margin-bottom: 15px;">
                <button class="lesson-node node-locked" disabled style="width: 100px; height: 100px; border-radius: 20px; background: var(--bg-card); border: 4px solid var(--border-color); box-shadow: 0 10px 0 var(--border-color); display: flex; align-items: center; justify-content: center; transform: translateX(0px); cursor: not-allowed; z-index: 2;">
                    <i class="fa-solid fa-treasure-chest" style="font-size: 3rem; color: var(--border-color);"></i>
                    <i class="fa-solid fa-box-open" style="font-size: 3rem; color: var(--border-color);"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- Full-screen Lesson Interface Mockup (Hidden initially) -->
    <div id="lesson-interface" class="lesson-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--bg-main); z-index: 1000; flex-direction: column;">
        
        <!-- Lesson Header/Progress -->
        <div class="lesson-header" style="padding: 20px 40px; display: flex; align-items: center; gap: 20px;">
            <button onclick="closeLesson()" class="btn-icon" style="background: transparent; border: none; font-size: 1.5rem; color: var(--text-muted);"><i class="fa-solid fa-xmark"></i></button>
            <div class="progress-bar" style="flex-grow: 1; height: 16px; background: var(--bg-card); border-radius: 10px; overflow: hidden; position: relative;">
                <div id="lesson-progress-fill" style="width: 20%; height: 100%; background: var(--success); border-radius: 10px; transition: width 0.4s ease-out; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.15);">
                    <div style="position: absolute; top: 4px; left: 10px; width: 80%; height: 4px; background: rgba(255,255,255,0.3); border-radius: 4px;"></div>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1.2rem; color: var(--danger);">
                <i class="fa-solid fa-heart"></i> 5
            </div>
        </div>

        <!-- Lesson Body -->
        <div class="lesson-body container fade-in-up" style="flex-grow: 1; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; padding: 20px;">
            <h1 style="font-size: 2rem; margin-bottom: 30px;">Ushbu imo-ishora nimani anglatadi?</h1>
            
            <div class="lesson-video-wrapper glass-panel" style="background: var(--bg-card); height: 250px; border-radius: 20px; border: 2px solid var(--primary); display: flex; justify-content: center; align-items: center; margin-bottom: 40px; position: relative; overflow: hidden;">
                <i class="fa-solid fa-play" style="position: absolute; font-size: 3rem; color: rgba(255,255,255,0.8); z-index: 2; cursor: pointer;"></i>
                <img src="https://via.placeholder.com/600x300/111111/4285F4?text=Salom+Video+Avatar" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.6;" alt="Sign Language Avatar Video">
            </div>

            <!-- Multiple Choice Options -->
            <div class="quiz-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <label class="quiz-option" style="cursor: pointer;">
                    <input type="radio" name="quiz-answer" value="rahmat" style="display: none;">
                    <div class="quiz-card" style="padding: 20px; border: 2px solid var(--border-color); border-radius: 15px; background: var(--bg-card); text-align: center; font-size: 1.2rem; font-weight: 600; transition: all 0.2s;">
                        <span style="display: inline-block; width: 30px; height: 30px; border: 1px solid var(--text-muted); border-radius: 6px; margin-right: 15px; align-items: center; vertical-align: middle;">1</span>
                        Rahmat
                    </div>
                </label>
                <label class="quiz-option" style="cursor: pointer;">
                    <input type="radio" name="quiz-answer" value="salom" style="display: none;">
                    <div class="quiz-card" style="padding: 20px; border: 2px solid var(--border-color); border-radius: 15px; background: var(--bg-card); text-align: center; font-size: 1.2rem; font-weight: 600; transition: all 0.2s;">
                        <span style="display: inline-block; width: 30px; height: 30px; border: 1px solid var(--text-muted); border-radius: 6px; margin-right: 15px; align-items: center; vertical-align: middle;">2</span>
                        Assalomu Alaykum
                    </div>
                </label>
                <label class="quiz-option" style="cursor: pointer;">
                    <input type="radio" name="quiz-answer" value="ism" style="display: none;">
                    <div class="quiz-card" style="padding: 20px; border: 2px solid var(--border-color); border-radius: 15px; background: var(--bg-card); text-align: center; font-size: 1.2rem; font-weight: 600; transition: all 0.2s;">
                        <span style="display: inline-block; width: 30px; height: 30px; border: 1px solid var(--text-muted); border-radius: 6px; margin-right: 15px; align-items: center; vertical-align: middle;">3</span>
                        Ismingiz nima?
                    </div>
                </label>
                <label class="quiz-option" style="cursor: pointer;">
                    <input type="radio" name="quiz-answer" value="qayerda" style="display: none;">
                    <div class="quiz-card" style="padding: 20px; border: 2px solid var(--border-color); border-radius: 15px; background: var(--bg-card); text-align: center; font-size: 1.2rem; font-weight: 600; transition: all 0.2s;">
                        <span style="display: inline-block; width: 30px; height: 30px; border: 1px solid var(--text-muted); border-radius: 6px; margin-right: 15px; align-items: center; vertical-align: middle;">4</span>
                        Uzr, tushunmadim
                    </div>
                </label>
            </div>
        </div>

        <!-- Lesson Footer with Check Button -->
        <div class="lesson-footer" style="padding: 30px 40px; background: var(--bg-card); border-top: 2px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
            <button class="btn-outline" style="border: none; font-weight: bold; padding: 15px 30px; border-radius: 15px;" onclick="closeLesson()">O'tkazib yuborish</button>
            <button id="check-answer-btn" onclick="checkAnswer()" class="btn-primary" style="padding: 15px 50px; font-size: 1.2rem; border-radius: 15px; box-shadow: 0 5px 0 rgba(0,0,0,0.2) inset;" disabled>Tekshirish</button>
        </div>

        <!-- Feedback Overlay (Absolute) -->
        <div id="feedback-overlay" style="display: none; position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px; justify-content: space-between; align-items: center; transition: all 0.3s; z-index: 10;">
            <div style="display: flex; align-items: center; gap: 20px;">
                <div id="feedback-icon" style="width: 60px; height: 60px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; font-size: 2rem;">
                    <!-- Check or Cross -->
                </div>
                <div>
                    <h2 id="feedback-title" style="margin: 0; font-size: 1.5rem;">To'g'ri!</h2>
                    <p id="feedback-desc" style="margin: 5px 0 0 0; opacity: 0.9;">Ma'nosi: "Assalomu Alaykum"</p>
                </div>
            </div>
            <button id="next-question-btn" onclick="continueLesson()" class="btn-primary" style="padding: 15px 50px; font-size: 1.2rem; border-radius: 15px; background-color: white !important;">Davom etish</button>
        </div>

    </div>

    <!-- Reused footer logic (from template but completely simplified to not overlap Duolingo paths) -->
    
    <script src="script.js"></script>
    <script>
        // Quiz interactive logic handling locally 
        const quizOptions = document.querySelectorAll('input[name="quiz-answer"]');
        const checkBtn = document.getElementById('check-answer-btn');
        let selectedValue = null;

        quizOptions.forEach(opt => {
            opt.addEventListener('change', (e) => {
                // Reset styling
                document.querySelectorAll('.quiz-card').forEach(card => {
                    card.style.borderColor = 'var(--border-color)';
                    card.style.background = 'var(--bg-card)';
                });
                
                // Set active style
                if (e.target.checked) {
                    const card = e.target.nextElementSibling;
                    card.style.borderColor = 'var(--primary)';
                    card.style.background = 'rgba(37, 99, 235, 0.1)';
                    selectedValue = e.target.value;
                    checkBtn.disabled = false;
                }
            });
        });

        function startLesson(level) {
            document.getElementById('learning-dashboard').style.display = 'none';
            document.getElementById('navbar').style.display = 'none';
            document.getElementById('lesson-interface').style.display = 'flex';
        }

        function closeLesson() {
            document.getElementById('lesson-interface').style.display = 'none';
            document.getElementById('learning-dashboard').style.display = 'block';
            document.getElementById('navbar').style.display = 'block';
            // Reset state
            resetLessonState();
        }

        function checkAnswer() {
            const footer = document.querySelector('.lesson-footer');
            const feedbackOverlay = document.getElementById('feedback-overlay');
            const feedbackIcon = document.getElementById('feedback-icon');
            const feedbackTitle = document.getElementById('feedback-title');
            const nxtBtn = document.getElementById('next-question-btn');
            
            // Assume "salom" is the correct answer
            if (selectedValue === 'salom') {
                footer.style.display = 'none';
                feedbackOverlay.style.display = 'flex';
                feedbackOverlay.style.backgroundColor = 'var(--success)';
                feedbackOverlay.style.color = 'white';
                
                feedbackIcon.innerHTML = '<i class="fa-solid fa-check text-success"></i>';
                feedbackTitle.innerText = "Ajoyib!";
                nxtBtn.style.color = 'var(--success)';
                
                // Update progress
                document.getElementById('lesson-progress-fill').style.width = '45%';
            } else {
                footer.style.display = 'none';
                feedbackOverlay.style.display = 'flex';
                feedbackOverlay.style.backgroundColor = 'var(--danger)';
                feedbackOverlay.style.color = 'white';
                
                feedbackIcon.innerHTML = '<i class="fa-solid fa-xmark text-danger"></i>';
                feedbackTitle.innerText = "Xato...";
                document.getElementById('feedback-desc').innerText = "To'g'ri javob: Assalomu Alaykum";
                nxtBtn.style.color = 'var(--danger)';
            }
        }

        function continueLesson() {
            // Usually this loads the next question, but for preview we will simulate finishing
            if (selectedValue === 'salom') {
                window.dispatchEvent(new CustomEvent('toast', {detail: {message: 'Dars yakunlandi! +10 Kristall', type: 'success'}}));
                setTimeout(closeLesson, 500);
            } else {
                resetLessonState();
            }
        }

        function resetLessonState() {
            const footer = document.querySelector('.lesson-footer');
            const feedbackOverlay = document.getElementById('feedback-overlay');
            
            feedbackOverlay.style.display = 'none';
            footer.style.display = 'flex';
            checkBtn.disabled = true;
            
            document.querySelectorAll('input[name="quiz-answer"]').forEach(opt => opt.checked = false);
            document.querySelectorAll('.quiz-card').forEach(card => {
                card.style.borderColor = 'var(--border-color)';
                card.style.background = 'var(--bg-card)';
            });
            selectedValue = null;
        }

    </script>
</body>
</html>
