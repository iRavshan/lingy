<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UzSL — O'rganish Yo'li</title>
    <meta name="description" content="O'zbek imo-ishora tilini Duolingo uslubida bosqichma-bosqich o'rganing.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="assets/theme.js"></script>

    <style>
        :root, [data-theme="dark"] {
            --bg-main: #0B0B13;
            --bg-card: rgba(22, 24, 43, 0.7);
            --bg-secondary: #131422;
            --bg-nav: rgba(11, 11, 19, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --primary-light: rgba(99, 102, 241, 0.12);
            --secondary: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --success-dark: #059669;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gold: #fbbf24;
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --radius-md: 1rem;
            --radius-lg: 1.5rem;
            --glass-blur: blur(12px);
        }

        [data-theme="light"] {
            --bg-main: #f4f5f9;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-secondary: #ffffff;
            --bg-nav: rgba(255, 255, 255, 0.9);
            --border-color: rgba(0, 0, 0, 0.08);
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* === App Layout === */
        .app-layout {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100vh;
        }

        /* === Left Sidebar (Desktop) === */
        .sidebar {
            width: 250px;
            position: sticky;
            top: 0;
            height: 100vh;
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            background: var(--bg-main);
            z-index: 100;
        }
        .sidebar-logo {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            padding-left: 10px;
        }
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .sidebar-menu a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 600;
            padding: 14px 18px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.2s;
        }
        .sidebar-menu a:hover {
            background: var(--bg-card);
            color: var(--text-main);
        }
        .sidebar-menu a.active {
            color: var(--primary);
            background: var(--primary-light);
            border: 1px solid var(--border-color);
        }
        
        .sidebar-menu .more-menu-wrapper { position: relative; width: 100%; display: flex; flex-direction: column; }
        .sidebar-menu .more-dropdown {
            position: absolute;
            left: calc(100% + 10px);
            bottom: -220px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            width: 260px;
            opacity: 0;
            visibility: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: var(--glass-blur);
            z-index: 200;
            pointer-events: none;
            transform: translateY(10px);
        }
        .sidebar-menu .more-menu-wrapper:hover .more-dropdown {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateY(0);
        }
        .sidebar-menu .dropdown-divider {
            height: 1px;
            background: var(--border-color);
            margin: 6px 12px;
        }
        .sidebar-menu .more-dropdown a {
            padding: 12px 16px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            border-radius: 12px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            margin: 0; /* Clear any conflicting margins */
        }
        .sidebar-menu .more-dropdown a:hover {
            background: var(--primary-light);
            color: var(--primary);
        }
        .sidebar-menu .more-dropdown a.logout-btn { color: var(--danger); font-weight: 700; }
        .sidebar-menu .more-dropdown a.logout-btn:hover { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        .certificate-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
        }
        .certificate-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--gold), #f59e0b);
        }
        .certificate-card h3 {
            font-family: var(--font-heading);
            font-size: 1.15rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }
        .cert-preview {
            background: linear-gradient(135deg, rgba(251,191,36,0.1), rgba(245,158,11,0.05));
            border: 1px solid rgba(251,191,36,0.3);
            border-radius: 16px;
            padding: 24px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            position: relative;
        }
        .cert-preview i.fa-award { 
            font-size: 3.5rem; 
            color: var(--gold); 
            filter: drop-shadow(0 6px 12px rgba(245,158,11,0.3)); 
        }
        .cert-text { 
            font-family: var(--font-heading); 
            font-weight: 800; 
            font-size: 1.05rem; 
        }
        .cert-progress-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
            margin-top: 4px;
            width: 100%;
        }
        .cert-progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--text-main);
        }
        .cert-progress-header span:last-child {
            color: var(--gold);
        }
        .cert-progress-bar-wrap {
            height: 12px;
            background: var(--bg-main);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .cert-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #fcd34d, var(--gold));
            border-radius: 20px;
            box-shadow: 0 0 10px rgba(251,191,36,0.5);
        }

        /* === Main Content === */
        .main-content {
            flex: 1;
            width: 100%;
            margin: 0 auto;
            padding-bottom: 100px;
            border-right: 1px solid var(--border-color);
        }

        /* === Mobile Top Bar === */
        .mobile-top-bar {
            display: none; /* hidden on desktop */
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-nav);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-color);
            height: 60px;
            padding: 0 20px;
            align-items: center;
            justify-content: space-between;
        }
        .mobile-logo {
            font-family: var(--font-heading);
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
        }

        /* === Right Progression Panel === */
        .right-panel {
            width: 300px;
            position: sticky;
            top: 0;
            height: 100vh;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .theme-toggle {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .theme-toggle:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .top-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 0.95rem;
        }
        .stat-item i { font-size: 1.1rem; }
        .stat-fire { color: #f97316; }
        .stat-bolt { color: #6366f1; }

        /* === Unit Header === */
        .unit-header {
            max-width: 700px;
            margin: 0 auto;
            padding: 35px 20px 10px;
        }
        .unit-banner {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            padding: 18px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 40px rgba(99,102,241,0.25);
        }
        .unit-banner-text h2 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
            margin-bottom: 4px;
        }
        .unit-banner-text p {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }
        .unit-banner-icon {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        /* === Learning Path === */
        .path-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 10px 20px 50px;
            position: relative;
        }

        .path-row {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 110px;
            position: relative;
            z-index: 1;
        }

        /* Zigzag relative offsets */
        .pos-left { margin-right: 150px; }
        .pos-center { margin: 0; }
        .pos-right { margin-left: 150px; }

        /* === Node (Lesson Buttons) === */
        .node {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            box-shadow: 0 8px 0 rgba(0,0,0,0.15), inset 0 4px 6px rgba(255,255,255,0.05);
        }
        .node:hover { transform: translateY(-4px); }
        .node:active { transform: translateY(4px); box-shadow: 0 0 0 rgba(0,0,0,0) !important; }

        .node-icon {
            font-size: 2.2rem;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Completed node */
        .node.completed {
            background: linear-gradient(145deg, var(--success), #059669);
            border: none;
            box-shadow: 0 8px 0 #047857, 0 15px 25px rgba(16,185,129,0.3), inset 0 4px 5px rgba(255,255,255,0.3);
        }
        .node.completed .node-icon { color: white; }
        .node.completed .node-label { color: var(--text-main); }
        .node.completed:active {
            transform: translateY(8px);
        }

        /* Current / Active node */
        .node.current {
            background: linear-gradient(145deg, var(--secondary), #be185d);
            border: none;
            box-shadow: 0 8px 0 #9d174d, 0 0 35px rgba(236,72,153,0.5), inset 0 4px 5px rgba(255,255,255,0.3);
            animation: nodePulse 2.5s ease-in-out infinite;
        }
        .node.current .node-icon { color: white; }
        .node.current:active {
            transform: translateY(8px);
        }
        
        .node.current::before {
            content: 'Davom etish';
            position: absolute;
            top: -58px;
            left: 50%;
            background: var(--secondary);
            color: white;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 0.82rem;
            font-family: var(--font-body);
            font-weight: 800;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid var(--border-color);
            pointer-events: none;
            z-index: 10;
            animation: bounceTooltipText 2s ease-in-out infinite;
        }
        .node.current::after {
            content: '';
            position: absolute;
            top: -25px;
            left: 50%;
            width: 12px;
            height: 12px;
            background: var(--secondary);
            border-right: 2px solid var(--border-color);
            border-bottom: 2px solid var(--border-color);
            pointer-events: none;
            z-index: 11;
            animation: bounceTooltipArrow 2s ease-in-out infinite;
        }

        @keyframes nodePulse {
            0%, 100% { box-shadow: 0 8px 0 #9d174d, 0 0 20px rgba(236,72,153,0.4), inset 0 4px 5px rgba(255,255,255,0.3); }
            50% { box-shadow: 0 8px 0 #9d174d, 0 0 40px rgba(236,72,153,0.7), inset 0 4px 5px rgba(255,255,255,0.3); }
        }
        @keyframes bounceTooltipText {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }
        @keyframes bounceTooltipArrow {
            0%, 100% { transform: translateX(-50%) translateY(0) rotate(45deg); }
            50% { transform: translateX(-50%) translateY(-5px) rotate(45deg); }
        }

        /* Locked node */
        .node.locked {
            filter: grayscale(1);
            opacity: 0.6;
            cursor: not-allowed;
            background: var(--bg-card);
            border-color: var(--border-color);
            box-shadow: 0 6px 0 rgba(0,0,0,0.15);
        }
        .node.locked .node-icon { color: var(--text-muted); opacity: 0.7; }
        .node.locked:hover { transform: none; }
        .node.locked:active { transform: translateY(6px); }

        /* Checkpoint (Trophy) node */
        .node.checkpoint {
            width: 95px;
            height: 95px;
            border-radius: 28px;
        }
        .node.checkpoint.completed {
            background: linear-gradient(145deg, var(--gold), #d97706);
            border: none;
            box-shadow: 0 8px 0 #b45309, 0 15px 30px rgba(251,191,36,0.3), inset 0 4px 5px rgba(255,255,255,0.4);
        }
        .node.checkpoint.completed:active {
            transform: translateY(8px);
        }
        .node.checkpoint.locked {
            border-radius: 28px;
        }

        /* Crown badge */
        .node-crown {
            position: absolute;
            top: -14px;
            right: -8px;
            font-size: 1.1rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        /* === Unit Section & Sticky Header === */
        .unit-section {
            position: relative;
            z-index: 10;
        }
        .unit-sticky-wrapper {
            position: sticky;
            top: 0px; /* Offset for top-nav height */
            z-index: 50;
            background: var(--bg-main);
            padding: 20px 0 0;
            margin-bottom: 20px;
        }
        .section-divider {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .unit-banner.secondary {
            background: linear-gradient(135deg, #7c3aed, #2563eb);
        }
        .unit-banner.gold {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
        }

        /* === Right Progression Cards === */
        .panel-stats {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: space-evenly;
            margin-bottom: 10px;
        }
        .progression-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .progression-card h3 {
            font-family: var(--font-heading);
            font-size: 1.15rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .progress-bar-wrap {
            height: 16px;
            background: var(--bg-secondary);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .progress-bar {
            height: 100%;
            background: var(--warning);
            border-radius: 20px;
        }
        .progression-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.4;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 5px;
        }
        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }

        /* === Mobile Bottom Nav === */
        .bottom-nav {
            display: none; /* hidden on desktop */
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-nav);
            backdrop-filter: var(--glass-blur);
            border-top: 1px solid var(--border-color);
            z-index: 100;
            padding: 8px 0 12px;
        }
        .bottom-nav-inner {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 20px;
        }
        .nav-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            transition: color 0.2s;
            padding: 4px 16px;
            border-radius: 12px;
        }
        .nav-tab i { font-size: 1.4rem; margin-bottom: 2px; }
        .nav-tab.active { color: var(--primary); }
        .nav-tab.active i {
            background: var(--primary-light);
            padding: 6px 12px;
            border-radius: 12px;
        }
        .nav-tab:hover { color: var(--primary); }

        /* === Lesson Popup === */
        .lesson-popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .lesson-popup-overlay.active { display: flex; }

        .lesson-popup {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 24px 24px 24px 24px;
            width: 100%;
            max-width: 420px;
            padding: 35px 30px 30px;
            text-align: center;
            animation: popupSlideUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
            margin-bottom: 60px;
        }
        @keyframes popupSlideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .popup-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        .popup-icon.green { background: rgba(16,185,129,0.15); color: var(--success); }
        .popup-icon.blue { background: var(--primary-light); color: var(--primary); }
        .popup-icon.pink { background: rgba(236,72,153,0.15); color: var(--secondary); }
        .popup-icon.gold { background: rgba(251,191,36,0.15); color: var(--gold); }
        .popup-icon.gray { background: rgba(148,163,184,0.1); color: var(--text-muted); }

        .popup-title {
            font-family: var(--font-heading);
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 6px;
        }
        .popup-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .popup-xp {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 20px;
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .popup-btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-family: var(--font-body);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .popup-btn.primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 5px 0 #4338ca;
        }
        .popup-btn.primary:active {
            box-shadow: 0 2px 0 #4338ca;
            transform: translateY(3px);
        }
        .popup-btn.secondary {
            background: var(--secondary);
            color: white;
            box-shadow: 0 5px 0 #be185d;
        }
        .popup-btn.secondary:active {
            box-shadow: 0 2px 0 #be185d;
            transform: translateY(3px);
        }
        .popup-btn.success {
            background: var(--success);
            color: white;
            box-shadow: 0 5px 0 var(--success-dark);
        }
        .popup-btn.success:active {
            box-shadow: 0 2px 0 var(--success-dark);
            transform: translateY(3px);
        }
        .popup-btn.locked {
            background: var(--bg-card);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            box-shadow: none;

<script>
// ===== DATA =====
const units = [
    {
        title: "Bo'lim 1: Asoslar",
        desc: "Salomlashish va daktil alifbosi",
        icon: "👋",
        gradient: "linear-gradient(135deg, #6366f1, #ec4899)",
        lessons: [
            { id: 1, title: "Salom!", desc: "Salomlashish va tanishish", xp: 10, status: "completed", link: "/learn/dictionary.html" },
            { id: 2, title: "A-D harflari", desc: "Birinchi 4 ta daktil harfi", xp: 10, status: "completed", link: "/learn/alphabet.html" },
            { id: 3, title: "Ha va Yo'q", desc: "Oddiy javoblar", xp: 15, status: "completed", link: "/learn/dictionary.html" },
            { id: 4, title: "E-I harflari", desc: "Navbatdagi harflar guruhi", xp: 15, status: "current", link: "/learn/alphabet.html" },
            { id: 5, title: "Oila a'zolari", desc: "Ona, Ota, Aka, Opa", xp: 20, status: "locked" },
            { id: "cp1", title: "Birinchi sinov", desc: "Bo'lim 1 yakuniy testi", xp: 50, status: "locked", checkpoint: true }
        ]
    },
    {
        title: "Bo'lim 2: Kundalik hayot",
        desc: "Har kuni kerak bo'ladigan so'zlar",
        icon: "🏠",
        gradient: "linear-gradient(135deg, #7c3aed, #2563eb)",
        lessons: [
            { id: 6, title: "Uy va maktab", desc: "Muhim joylar nomlari", xp: 15, status: "locked" },
            { id: 7, title: "J-N harflari", desc: "Daktil davomi", xp: 15, status: "locked" },
            { id: 8, title: "Ovqatlanish", desc: "Non, suv, choy, palov", xp: 20, status: "locked" },
            { id: 9, title: "Ranglar", desc: "Qizil, ko'k, yashil...", xp: 15, status: "locked" },
            { id: 10, title: "O-T harflari", desc: "Daktil harflari davomi", xp: 20, status: "locked" },
            { id: "cp2", title: "Ikkinchi sinov", desc: "Bo'lim 2 yakuniy testi", xp: 50, status: "locked", checkpoint: true }
        ]
    },
    {
        title: "Bo'lim 3: So'zlashish",
        desc: "Gaplar tuzish va muloqot",
        icon: "💬",
        gradient: "linear-gradient(135deg, #f59e0b, #ef4444)",
        lessons: [
            { id: 11, title: "Raqamlar", desc: "1 dan 10 gacha sanash", xp: 15, status: "locked" },
            { id: 12, title: "U-Z harflari", desc: "Oxirgi harflar guruhi", xp: 20, status: "locked" },
            { id: 13, title: "His-tuyg'ular", desc: "Xursand, g'amgin, sevgi", xp: 20, status: "locked" },
            { id: 14, title: "Maxsus harflar", desc: "O', G', Sh, Ch, Ng", xp: 25, status: "locked" },
            { id: 15, title: "Hayvonlar", desc: "Mushuk, it, qush...", xp: 20, status: "locked" },
            { id: 16, title: "Tabiat", desc: "Quyosh, oy, yomg'ir", xp: 20, status: "locked" },
            { id: "cp3", title: "Yakuniy imtihon", desc: "Barcha darslar bo'yicha sinov", xp: 100, status: "locked", checkpoint: true }
        ]
    }
];

// Zigzag pattern
const zigzag = ['center', 'right', 'center', 'left', 'center', 'right'];

function renderPath() {
    const container = document.getElementById('pathContent');
    container.innerHTML = '';

    const rowHeight = 110;
    const cx = 150;
    const offset = 75;
    const getX = (align) => align === 'left' ? cx - offset : (align === 'right' ? cx + offset : cx);

    units.forEach((unit, ui) => {
        // Wrap everything in a section to support sticky headers correctly
        const unitSection = document.createElement('section');
        unitSection.className = 'unit-section';

        const stickyWrap = document.createElement('div');
        stickyWrap.className = 'unit-sticky-wrapper';
        stickyWrap.innerHTML = `
            <div class="section-divider">
                <div class="unit-banner" style="background: ${unit.gradient};">
                    <div class="unit-banner-text">
                        <h2>${unit.title}</h2>
                        <p>${unit.desc}</p>
                    </div>
                    <div class="unit-banner-icon">${unit.icon}</div>
                </div>
            </div>
        `;
        unitSection.appendChild(stickyWrap);

        const pathWrap = document.createElement('div');
        pathWrap.className = 'path-container';

        unit.lessons.forEach((lesson, li) => {
            const alignment = zigzag[li % zigzag.length];
            const row = document.createElement('div');
            row.className = 'path-row';
            
            const nodeClass = `node pos-${alignment} ${lesson.status}${lesson.checkpoint ? ' checkpoint' : ''}`;
            
            let iconHTML = '';
            if (lesson.checkpoint) {
                iconHTML = `<span class="node-icon"><i class="fa-solid fa-trophy"></i></span>`;
            } else if (lesson.status === 'completed') {
                iconHTML = `<span class="node-icon"><i class="fa-solid fa-check"></i></span>`;
            } else if (lesson.status === 'current') {
                iconHTML = `<span class="node-icon"><i class="fa-solid fa-play"></i></span>`;
            } else {
                iconHTML = `<span class="node-icon"><i class="fa-solid fa-lock"></i></span>`;
            }

            const node = document.createElement('div');
            node.className = nodeClass;
            node.onclick = () => openPopup(lesson);
            node.innerHTML = `
                ${iconHTML}
            `;

            row.appendChild(node);
            pathWrap.appendChild(row);
        });

        unitSection.appendChild(pathWrap);
        container.appendChild(unitSection);
    });
}

// ===== POPUP =====
let currentLesson = null;

function openPopup(lesson) {
    currentLesson = lesson;
    const overlay = document.getElementById('lessonPopup');
    const icon = document.getElementById('popupIcon');
    const title = document.getElementById('popupTitle');
    const desc = document.getElementById('popupDesc');
    const xp = document.getElementById('popupXp');
    const btn = document.getElementById('popupBtn');

    title.textContent = lesson.title;
    desc.textContent = lesson.desc;
    xp.innerHTML = `<i class="fa-solid fa-bolt"></i> +${lesson.xp} XP`;

    if (lesson.checkpoint) {
        icon.className = lesson.status === 'completed' ? 'popup-icon gold' : 'popup-icon gray';
        icon.innerHTML = '<i class="fa-solid fa-trophy"></i>';
        btn.textContent = lesson.status === 'completed' ? 'Qayta o\'tish' : 'Qulflangan';
        btn.className = lesson.status === 'completed' ? 'popup-btn primary' : 'popup-btn locked';
    } else if (lesson.status === 'completed') {
        icon.className = 'popup-icon green';
        icon.innerHTML = '<i class="fa-solid fa-check"></i>';
        btn.textContent = 'Qayta o\'tish';
        btn.className = 'popup-btn success';
    } else if (lesson.status === 'current') {
        icon.className = 'popup-icon pink';
        icon.innerHTML = '<i class="fa-solid fa-play"></i>';
        btn.textContent = 'Boshlash';
        btn.className = 'popup-btn secondary';
    } else {
        icon.className = 'popup-icon gray';
        icon.innerHTML = '<i class="fa-solid fa-lock"></i>';
        btn.textContent = 'Qulflangan';
        btn.className = 'popup-btn locked';
    }

    overlay.classList.add('active');
}

function closePopup() {
    document.getElementById('lessonPopup').classList.remove('active');
}

function startLesson() {
    if (!currentLesson) return;
    if (currentLesson.status === 'locked') return;
    if (currentLesson.link) {
        window.location.href = currentLesson.link;
    } else {
        closePopup();
    }
}

// Close popup on overlay click
document.getElementById('lessonPopup').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closePopup();
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closePopup();
});

// ===== INIT =====
renderPath();
</script>
