<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imo-Daktil: Micro-Learning</title>
    <link rel="stylesheet" href="/learn/assets/style.css">
</head>
<body>
    <div class="app-container">
        <div class="progress-container">
            <div class="close-btn">×</div>
            <div class="progress-bar">
                <div id="progress" style="width: 10%;"></div>
            </div>
            <div class="heart-container">❤️ <span id="lives">5</span></div>
        </div>

        <div id="lesson-screen" class="screen">
            <h2 id="question-text">Bu qaysi harfning ishorasi?</h2>
            <div class="sign-display">
                <img id="sign-image" src="https://via.placeholder.com/200x200?text=A" alt="Imo-ishora">
            </div>
            
            <div class="options-grid" id="options">
                </div>
        </div>

        <div id="feedback" class="feedback-panel hidden">
            <div class="feedback-content">
                <h3 id="feedback-title">To'g'ri!</h3>
                <button id="next-btn">Davom etish</button>
            </div>
        </div>
    </div>
    <script src="/learn/assets/script.js"></script>
</body>
</html>
