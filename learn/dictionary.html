<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kundalik So'zlar Lug'ati — UzSL</title>
    <meta name="description" content="O'zbek imo-ishora tili kundalik so'zlar lug'ati. Eng ko'p ishlatiladigan so'zlarni o'rganing.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="assets/theme.js"></script>

    <style>
        :root, [data-theme="dark"] {
            --bg-main: #0B0B13;
            --bg-card: rgba(22, 24, 43, 0.7);
            --bg-card-hover: rgba(30, 32, 55, 0.9);
            --bg-secondary: #131422;
            --bg-nav: rgba(11, 11, 19, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.18);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-light: rgba(99, 102, 241, 0.12);
            --secondary: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --radius-sm: 0.5rem;
            --radius-md: 1rem;
            --radius-lg: 1.5rem;
            --glass-blur: blur(12px);
        }

        [data-theme="light"] {
            --bg-main: #f4f5f9;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-card-hover: rgba(245, 245, 250, 0.95);
            --bg-secondary: #ffffff;
            --bg-nav: rgba(255, 255, 255, 0.9);
            --border-color: rgba(0, 0, 0, 0.08);
            --border-hover: rgba(0, 0, 0, 0.15);
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* === Top Navigation === */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-nav);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 0;
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-back {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .nav-back:hover { color: var(--primary); }

        .theme-toggle {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .theme-toggle:hover { border-color: var(--primary); color: var(--primary); }

        /* === Hero === */
        .page-hero {
            text-align: center;
            padding: 50px 24px 20px;
            position: relative;
        }
        .page-hero h1 {
            font-family: var(--font-heading);
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 12px;
        }
        .page-hero h1 span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .page-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .hero-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            pointer-events: none;
        }
        .hero-glow.left { top: -100px; left: -100px; background: var(--primary); }
        .hero-glow.right { top: -50px; right: -100px; background: var(--secondary); }

        /* === Search Bar === */
        .search-section {
            max-width: 600px;
            margin: 30px auto 10px;
            padding: 0 24px;
        }
        .search-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-card);
            border: 1.5px solid var(--border-color);
            border-radius: 16px;
            padding: 14px 22px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99,102,241,0.1);
        }
        .search-wrapper i { color: var(--text-muted); font-size: 1.1rem; }
        .search-wrapper input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 1rem;
            font-family: var(--font-body);
        }
        .search-wrapper input::placeholder { color: var(--text-muted); opacity: 0.5; }
        .search-clear {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            display: none;
            transition: color 0.2s;
        }
        .search-clear:hover { color: var(--danger); }
        .search-count {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 12px;
            opacity: 0.7;
        }

        /* === Category Tabs === */
        .category-bar {
            max-width: 1200px;
            margin: 25px auto 30px;
            padding: 0 24px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .category-bar::-webkit-scrollbar { display: none; }

        .cat-btn {
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-muted);
            font-size: 0.85rem;
            font-family: var(--font-body);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cat-btn:hover { border-color: var(--primary); color: var(--text-main); }
        .cat-btn.active {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
            font-weight: 600;
        }
        .cat-btn .cat-emoji { font-size: 1.1rem; }

        /* === Words Grid === */
        .words-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 60px;
        }
        .words-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 16px;
        }

        /* === Word Card === */
        .word-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px 16px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .word-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(99,102,241,0.06), rgba(236,72,153,0.04));
            opacity: 0;
            transition: opacity 0.3s;
        }
        .word-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(99, 102, 241, 0.15);
        }
        .word-card:hover::before { opacity: 1; }

        .word-emoji {
            font-size: 3rem;
            margin-bottom: 10px;
            display: block;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 3px 8px rgba(0,0,0,0.3));
        }

        .word-uz {
            font-family: var(--font-heading);
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 4px;
            position: relative;
            z-index: 1;
        }
        .word-card:hover .word-uz {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .word-en {
            font-size: 0.78rem;
            color: var(--text-muted);
            position: relative;
            z-index: 1;
        }

        .word-hand {
            margin-top: 10px;
            width: 44px;
            height: 44px;
            margin-left: auto;
            margin-right: auto;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            position: relative;
            z-index: 1;
        }

        /* === No Results === */
        .no-results {
            text-align: center;
            padding: 80px 20px;
            display: none;
        }
        .no-results .nr-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }
        .no-results h3 {
            font-family: var(--font-heading);
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 1.3rem;
        }
        .no-results p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* === Detail Modal === */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }

        .modal-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            padding: 40px 35px;
            text-align: center;
            position: relative;
            animation: modalIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes modalIn {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .modal-close:hover { color: var(--danger); }

        .modal-emoji {
            font-size: 5rem;
            display: block;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }

        .modal-word-uz {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .modal-word-en {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .modal-hand-box {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: var(--bg-card);
            border: 2px solid var(--primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 8px 25px rgba(99,102,241,0.2);
            animation: handBounce 2s ease-in-out infinite;
        }
        @keyframes handBounce {
            0%, 100% { transform: scale(1) rotate(0); }
            50% { transform: scale(1.05) rotate(3deg); }
        }

        .modal-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.7;
            margin-bottom: 16px;
        }

        .modal-cat-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            background: var(--primary-light);
            color: var(--primary);
        }

        .modal-nav {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .modal-nav button {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-nav button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* === Responsive === */
        @media (max-width: 768px) {
            .page-hero h1 { font-size: 2rem; }
            .words-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
            .modal-card { padding: 30px 24px; }
        }
        @media (max-width: 480px) {
            .words-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

let currentCat = 'all';
let currentSearch = '';
let currentModalIdx = -1;
let filteredWords = [...words];

// Build category buttons
function buildCatBar() {
    const bar = document.getElementById('categoryBar');
    categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn';
        btn.dataset.cat = cat.id;
        btn.onclick = () => filterCat(cat.id, btn);
        btn.innerHTML = `<span class="cat-emoji">${cat.emoji}</span> ${cat.name}`;
        bar.appendChild(btn);
    });
}

function getFiltered() {
    let result = [...words];
    if (currentCat !== 'all') {
        result = result.filter(w => w.cat === currentCat);
    }
    if (currentSearch) {
        const q = currentSearch.toLowerCase();
        result = result.filter(w =>
            w.uz.toLowerCase().includes(q) ||
            w.en.toLowerCase().includes(q)
        );
    }
    return result;
}

function renderGrid() {
    const grid = document.getElementById('wordsGrid');
    const noRes = document.getElementById('noResults');
    grid.innerHTML = '';

    filteredWords = getFiltered();

    if (filteredWords.length === 0) {
        grid.style.display = 'none';
        noRes.style.display = 'block';
    } else {
        grid.style.display = 'grid';
        noRes.style.display = 'none';

        filteredWords.forEach((w, i) => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.onclick = () => openModal(i);
            card.innerHTML = `
                <span class="word-emoji">${w.emoji}</span>
                <div class="word-uz">${w.uz}</div>
                <div class="word-hand">${w.hand}</div>
            `;
            grid.appendChild(card);
        });
    }

    // Update count
    const countEl = document.getElementById('searchCount');
    if (currentSearch) {
        countEl.textContent = `${filteredWords.length} ta natija topildi`;
    } else {
        countEl.textContent = `Jami: ${filteredWords.length} ta so'z`;
    }
}

function filterCat(catId, btn) {
    currentCat = catId;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
}

// Search
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');

searchInput.addEventListener('input', (e) => {
    currentSearch = e.target.value.trim();
    searchClear.style.display = currentSearch ? 'block' : 'none';
    renderGrid();
});

function clearSearch() {
    searchInput.value = '';
    currentSearch = '';
    searchClear.style.display = 'none';
    searchInput.focus();
    renderGrid();
}

// Modal
function openModal(filteredIdx) {
    currentModalIdx = filteredIdx;
    const w = filteredWords[filteredIdx];
    document.getElementById('mEmoji').textContent = w.emoji;
    document.getElementById('mWordUz').textContent = w.uz;
    document.getElementById('mWordEn').textContent = w.en;
    document.getElementById('mHand').textContent = w.hand;
    document.getElementById('mDesc').textContent = w.desc;

    const cat = categories.find(c => c.id === w.cat);
    document.getElementById('mCat').innerHTML = `<i class="fa-solid fa-tag"></i> ${cat ? cat.name : w.cat}`;

    document.getElementById('wordModal').classList.add('active');
}

function closeModal() {
    document.getElementById('wordModal').classList.remove('active');
}

function navWord(dir) {
    let next = currentModalIdx + dir;
    if (next < 0) next = filteredWords.length - 1;
    if (next >= filteredWords.length) next = 0;
    openModal(next);
}

document.getElementById('wordModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'ArrowLeft') navWord(-1);
    if (e.key === 'ArrowRight') navWord(1);
});

// Init
buildCatBar();
renderGrid();
</script>
